# ================================================================
# default.conf — Added By Himel Sarkar 10-06-2026
# LEARNING: Nginx Reverse Proxy
# / → React static files দেখাবে
# /api/ → Backend API container-এ route করবে (CORS সমস্যা থাকবে না)
# ================================================================

server {
    listen 80;
    server_name localhost;

    # React Router fix — কোনো route না পেলে index.html দেখাবে
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API requests proxy to .NET API container
    location /api/ {
        proxy_pass http://erp-api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
