<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First ERP System</title>
    <!--
    ============================================================
    LEARNING NOTE — Added By Himel Sarkar 08-06-2025
    Bootstrap 5 CDN — CSS framework for responsive layout
    Bootstrap Icons CDN — icon library (bi-*)
    style.css — our custom styles on top of Bootstrap
    ============================================================
    -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

<!--
================================================================
LOGIN PAGE — Added By Himel Sarker 08-06-2025
FLOW: User types email+password → clicks Login
      → app.js sends AJAX POST to /api/employee/login
      → API returns JWT token
      → token saved in localStorage
      → loginPage hidden, dashboardPage shown
================================================================
-->
<div id="loginPage" class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-dark">
    <div class="card shadow-lg" style="width:420px">
        <div class="card-body p-4">

            <!-- Brand header -->
            <div class="text-center mb-4">
                <div class="login-logo mb-2">
                    <i class="bi bi-building-gear"></i>
                </div>
                <h4 class="fw-bold mb-0">First ERP System</h4>
                <small class="text-muted">Sign in to your account</small>
            </div>

            <!-- Alert box — hidden by default, shown on error -->
            <!-- LEARNING: d-none = display:none via Bootstrap -->
            <div id="loginAlert" class="alert d-none"></div>

            <!-- Email field -->
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-envelope me-1"></i>Email
                </label>
                <input type="email" id="loginEmail" class="form-control form-control-lg"
                       placeholder="email@erp.com" autocomplete="email">
            </div>

            <!--
            PASSWORD FIELD WITH EYE TOGGLE — Added By Himel Sarker 08-06-2025
            LEARNING:
            - input-group wraps input + button together
            - eye button toggles input type between "password" and "text"
            - Bootstrap Icons: bi-eye (show) / bi-eye-slash (hide)
            - The toggle logic is in app.js → $('#togglePassword').on('click', ...)
            -->
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    <i class="bi bi-lock me-1"></i>Password
                </label>
                <div class="input-group">
                    <input type="password" id="loginPassword" class="form-control form-control-lg"
                           placeholder="Enter your password" autocomplete="current-password">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                            title="Show/Hide password">
                        <i class="bi bi-eye" id="togglePasswordIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Login button — spinner shown during AJAX call -->
            <button id="loginBtn" class="btn btn-primary btn-lg w-100">
                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none me-2"></span>
                <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </button>

            <!-- Footer note -->
            <div class="text-center mt-3">
                <small class="text-muted">ERP v1.0 &copy; 2025 Himel Sarker</small>
            </div>

        </div>
    </div>
</div>

<!--
================================================================
DASHBOARD PAGE — Added By Himel Sarker 08-06-2025
FLOW: After login → this div becomes visible (d-none removed)
      → loadEmployees() called via AJAX GET /api/employee
      → JWT token attached in Authorization header
      → employee list rendered in table
================================================================
-->
<div id="dashboardPage" class="d-none">

    <!--
    NAVBAR — Added By Himel Sarker 08-06-2025
    LEARNING: navbar-dark bg-dark = white text on dark background
    navUserName filled dynamically from localStorage user object
    -->
    <nav class="navbar navbar-dark bg-dark px-4 py-2">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-building-gear me-2"></i>First ERP System
        </span>
        <div class="d-flex align-items-center gap-3">
            <!-- User avatar + name -->
            <div class="d-flex align-items-center gap-2">
                <div class="nav-avatar">
                    <i class="bi bi-person-circle"></i>
                </div>
                <div>
                    <div class="text-white fw-semibold small" id="navUserName"></div>
                    <div class="text-white-50" style="font-size:11px" id="navUserRole"></div>
                </div>
            </div>
            <button class="btn btn-outline-light btn-sm" id="logoutBtn">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
        </div>
    </nav>

    <div class="container-fluid mt-4 px-4">

        <!--
        STATS CARDS — Added By Himel Sarker 08-06-2025
        LEARNING: These numbers update dynamically after loadEmployees() runs
        totalEmployees → employees.length
        totalDepts     → unique department count using Set
        loggedRole     → from localStorage user.role
        -->
        <div class="row mb-4 g-3">
            <div class="col-md-3">
                <div class="card stat-card text-white bg-primary h-100">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">Total Employees</div>
                            <div class="stat-value" id="totalEmployees">0</div>
                        </div>
                        <i class="bi bi-people stat-icon"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card text-white bg-success h-100">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">Departments</div>
                            <div class="stat-value" id="totalDepts">0</div>
                        </div>
                        <i class="bi bi-diagram-3 stat-icon"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card text-white bg-warning h-100">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">Logged In As</div>
                            <div class="stat-value-sm" id="loggedRole">-</div>
                        </div>
                        <i class="bi bi-shield-check stat-icon"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card text-white bg-info h-100">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-label">System</div>
                            <div class="stat-value-sm">ERP v1.0</div>
                        </div>
                        <i class="bi bi-gear stat-icon"></i>
                    </div>
                </div>
            </div>
        </div>

        <!--
        EMPLOYEE TABLE — Added By Himel Sarker 08-06-2025
        LEARNING:
        - table-hover = row highlight on mouse over
        - employeeTableBody filled dynamically by loadEmployees() in app.js
        - Add Employee button opens Bootstrap Modal (#addEmployeeModal)
        - Role-based: Admin sees all, Manager sees dept, Staff sees self
        -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0 fw-bold">
                    <i class="bi bi-people me-2"></i>Employee Management
                </h5>
                <div class="d-flex gap-2">
                    <!-- Refresh button -->
                    <button class="btn btn-outline-secondary btn-sm" id="refreshBtn" title="Refresh list">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                    <!-- Add Employee — opens modal -->
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal"
                            data-bs-target="#addEmployeeModal">
                        <i class="bi bi-plus-lg me-1"></i>Add Employee
                    </button>
                </div>
            </div>
            <div class="card-body p-0">
                <div id="tableAlert" class="alert d-none m-3"></div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-3">#</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Department</th>
                                <th>Position</th>
                                <th>Salary</th>
                                <th>Role</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody">
                            <tr><td colspan="8" class="text-center py-4 text-muted">
                                <i class="bi bi-hourglass-split me-2"></i>Loading...
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<!--
================================================================
ADD EMPLOYEE MODAL — Added By Himel Sarker 08-06-2025
FLOW: Fill form → click Save Employee
      → app.js validates fields
      → AJAX POST /api/employee/register with JWT header
      → on success: modal closes, loadEmployees() refreshes table
LEARNING:
- data-bs-toggle="modal" opens this modal
- id="addEmployeeModal" must match data-bs-target
- Password field also has eye toggle (toggleAddPassword)
================================================================
-->
<div class="modal fade" id="addEmployeeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">
                    <i class="bi bi-person-plus me-2"></i>Add New Employee
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="modalAlert" class="alert d-none"></div>
                <div class="mb-2">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" id="addFullName" class="form-control" placeholder="e.g. Rahim Ahmed">
                </div>
                <div class="mb-2">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" id="addEmail" class="form-control" placeholder="email@erp.com">
                </div>
                <!--
                PASSWORD WITH EYE TOGGLE (Modal) — Added By Himel Sarker 08-06-2025
                Same pattern as login password toggle
                -->
                <div class="mb-2">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <input type="password" id="addPassword" class="form-control" placeholder="min 6 characters">
                        <button class="btn btn-outline-secondary" type="button" id="toggleAddPassword">
                            <i class="bi bi-eye" id="toggleAddPasswordIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-2">
                    <label class="form-label fw-semibold">Department</label>
                    <input type="text" id="addDepartment" class="form-control" placeholder="e.g. IT, HR, Finance">
                </div>
                <div class="mb-2">
                    <label class="form-label fw-semibold">Position</label>
                    <input type="text" id="addPosition" class="form-control" placeholder="e.g. Junior Developer">
                </div>
                <div class="mb-2">
                    <label class="form-label fw-semibold">Salary (৳)</label>
                    <input type="number" id="addSalary" class="form-control" placeholder="e.g. 50000">
                </div>
                <div class="mb-2">
                    <label class="form-label fw-semibold">Role</label>
                    <select id="addRole" class="form-select">
                        <option value="Staff">Staff</option>
                        <option value="Manager">Manager</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="bi bi-x-lg me-1"></i>Cancel
                </button>
                <button type="button" class="btn btn-primary" id="saveEmployeeBtn">
                    <span id="saveSpinner" class="spinner-border spinner-border-sm d-none me-2"></span>
                    <i class="bi bi-check-lg me-1"></i>Save Employee
                </button>
            </div>
        </div>
    </div>
</div>

<!--
SCRIPTS — Added By Himel Sarker 08-06-2025
LEARNING: Scripts at bottom of body so HTML loads first
Bootstrap bundle = Bootstrap JS + Popper (needed for modals/dropdowns)
jQuery loaded before app.js because app.js uses $()
-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="app.js"></script>
</body>
</html>
