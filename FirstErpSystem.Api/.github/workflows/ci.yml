# ================================================================
# ci.yml — Added By Himel Sarkar 10-06-2026
# LEARNING: CI/CD = Continuous Integration / Continuous Deployment
# GitHub-এ code push করলে automatically এই script চলে
# Step 1: Code download করে
# Step 2: .NET install করে
# Step 3: Restore + Build করে
# Step 4: (Future) Test + Docker image push করবে
# ================================================================

name: .NET CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build App
      run: dotnet build --configuration Release --no-restore
